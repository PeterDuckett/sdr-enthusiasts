# Default values for readsb-protobuf.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/sdr-enthusiasts/docker-readsb-protobuf
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v4.0.3_nohealthcheck"

imagePullSecrets: []
nameOverride: "readsb-protobuf"
fullnameOverride: "sdr-enthusiasts-readsb-protobuf"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "readsb-protobuf"

service:
  main:
    enabled: false
    ports:
      http:
        enabled: false
        primary: true
        port: 8080

      rawinput:
        enabled: false
        protocol: TCP
        port: 30001

      rawoutput:
        enabled: false
        protocol: TCP
        port: 30002

      basestation:
        enabled: false
        protocol: TCP
        port: 30003

      beastinput:
        enabled: false
        protocol: TCP
        port: 30004

      beastoutput:
        enabled: false
        protocol: TCP
        port: 30005

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
